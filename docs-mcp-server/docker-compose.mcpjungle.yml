# MCPJungle gateway + docs-mcp + 一次性 registrar,用雙網路拓撲:
#   - shared-db:你的(共用)Postgres 所在的網路 → gateway 接它連 DB
#   - mcpjungl :MCPJungle 與各 MCP server 所在的網路
# 不含 Postgres(DB 由你的 DB stack 管,在 shared-db 上)。機密走 .env,不進 git。
#
# 前置(一次):建立兩個網路(shared-db 若你的 DB stack 已建就跳過)
#   docker network create shared-db
#   docker network create mcpjungl
# 起:
#   cp .env.mcpjungle.example .env   # 填 MCPJUNGLE_DATABASE_URL(指向 shared-db 上的 DB)
#   docker compose -f docker-compose.mcpjungle.yml up -d --build
services:
  mcpjungle:
    image: ghcr.io/mcpjungle/mcpjungle:${MCPJUNGLE_IMAGE_TAG:-latest-stdio}
    container_name: mcpjungle-server
    environment:
      # 連線字串走環境變數(密碼不落地);host = shared-db 上的 DB 容器名
      DATABASE_URL: ${MCPJUNGLE_DATABASE_URL:?set MCPJUNGLE_DATABASE_URL in .env}
      SERVER_MODE: ${SERVER_MODE:-development}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      MCP_SERVER_INIT_REQ_TIMEOUT_SEC: ${MCP_SERVER_INIT_REQ_TIMEOUT_SEC:-10}
    ports:
      - "${MCPJUNGLE_HOST_PORT:-18800}:8080"
    volumes:
      - ${MCPJUNGLE_DATA_DIR:-/mnt/docker/app/data/mcpjungle}:/host:ro
    networks: [mcpjungl, shared-db]   # 橋接:mcpjungl 找 MCP server、shared-db 連 DB
    restart: always

  docs-mcp:
    build: .
    image: docs-mcp-server
    container_name: docs-mcp-server
    environment:
      TRANSPORT: http
      PORT: "5690"
      # dev 留空 = 僅內部網路可達。要硬化:設 DOCS_MCP_AUTH_TOKEN 並在 mcpjungle/*.json 加 bearer_token。
      MCP_AUTH_TOKEN: ${DOCS_MCP_AUTH_TOKEN:-}
    networks: [mcpjungl]
    restart: unless-stopped

  # 一次性:等 gateway 起來後自動把所有 server 註冊,然後結束(GitOps 自動部署)
  registrar:
    image: ghcr.io/mcpjungle/mcpjungle:${MCPJUNGLE_IMAGE_TAG:-latest-stdio}
    depends_on:
      - mcpjungle
      - docs-mcp
    entrypoint: ["/bin/sh", "/registrar.sh"]
    environment:
      REGISTRY_URL: http://mcpjungle:8080
    volumes:
      - ./mcpjungle:/configs:ro
      - ./mcpjungle/registrar.sh:/registrar.sh:ro
    networks: [mcpjungl]
    restart: "no"

networks:
  shared-db:
    external: true
    name: ${SHARED_DB_NETWORK:-shared-db}
  mcpjungl:
    external: true
    name: ${MCPJUNGLE_NETWORK:-mcpjungl}
