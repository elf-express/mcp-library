# 本機端到端測試:雙網路拓撲(DB 在 shared-db、MCP 在 mcpjungl、gateway 橋接兩者)。
# 自包含、不依賴外部網路/DB;網路用 localtest-* 命名,避免撞到你正式的 mcpjungl / shared-db。
#
#   cd docs-mcp-server
#   docker compose -f docker-compose.localtest.yml up -d --build
#   docker exec mcpjungle-server /mcpjungle list servers    # 應自動有 5 個(registrar 註冊)
#   docker compose -f docker-compose.localtest.yml down -v
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mcpjungle
      POSTGRES_PASSWORD: mcpjungle
      POSTGRES_DB: mcpjungle
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcpjungle"]
      interval: 3s
      timeout: 3s
      retries: 30
    networks: [shared-db]          # DB 只在資料庫網路

  mcpjungle:
    image: ghcr.io/mcpjungle/mcpjungle:latest-stdio
    container_name: mcpjungle-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://mcpjungle:mcpjungle@postgres:5432/mcpjungle?sslmode=disable
      SERVER_MODE: development
    ports:
      - "18800:8080"
    volumes:
      - ./servers:/host:ro        # filesystem server 讀這裡(測試用;正式環境見 mcpjungle.yml)
    networks: [mcpjungl, shared-db] # gateway 橋接:mcpjungl 找 MCP server、shared-db 連 DB

  docs-mcp-server:
    build: ../docs-mcp-server
    image: ghcr.io/elf-express/docs-mcp-server:latest
    container_name: docs-mcp-server
    environment:
      TRANSPORT: http
      PORT: "5690"
    networks: [mcpjungl]            # MCP server 只在 mcpjungl

  registrar:
    image: ghcr.io/mcpjungle/mcpjungle:latest-stdio
    depends_on:
      - mcpjungle
      - docs-mcp-server
    entrypoint: ["/bin/sh", "/registrar.sh"]
    environment:
      REGISTRY_URL: http://mcpjungle:8080
    volumes:
      - ./servers:/configs:ro
      - ./registrar.sh:/registrar.sh:ro
    networks: [mcpjungl]
    restart: "no"

networks:
  shared-db:
    driver: bridge
    name: localtest-shared-db
  mcpjungl:
    driver: bridge
    name: localtest-mcpjungl
