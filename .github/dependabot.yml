version: 2
updates:
  # fc-designer-mcp server
  - package-ecosystem: "npm"
    directory: "/fc-designer-mcp"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(fc-deps)"

  # sqlsugar-mcp server
  - package-ecosystem: "npm"
    directory: "/sqlsugar-mcp/sqlsugar-mcp-server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(sqlsugar-deps)"

  # GitHub Actions workflows 本身
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
