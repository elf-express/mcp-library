name: CI

# =============================================================================
# monorepo 版通用 CI
# 觸發:push / PR 到 main
# 內含:
#   - basics:    commit lint、大檔案檢查、機密掃描
#   - build-test: matrix — 每個 server 的 TypeScript build + 單元測試
#   - docker-build: matrix — PR 時只 build 不 push(驗證映像可建)
# =============================================================================

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  basics:
    name: Basics (commit / file check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check commit messages (Conventional Commits)
        if: github.event_name == 'pull_request'
        uses: webiny/action-conventional-commits@v1.4.2

      - name: Check for large files (> 5MB)
        run: |
          LARGE_FILES=$(find . -type f -size +5M -not -path "./.git/*" -not -path "*/node_modules/*" || true)
          if [ -n "$LARGE_FILES" ]; then
            echo "::error::發現大檔案(>5MB),請考慮使用 Git LFS:"
            echo "$LARGE_FILES"
            exit 1
          fi

      - name: Check for forbidden patterns (basic secret scan)
        run: |
          PATTERN='(password|passwd|secret|api[_-]?key|access[_-]?token|auth[_-]?token|connection[_-]?string|private[_-]?key|client[_-]?secret)["'"'"']?\s*[:=]\s*["'"'"'][^"'"'"']{8,}["'"'"']'
          if grep -rniE "$PATTERN" \
               --include="*.cs" --include="*.ts" --include="*.js" --include="*.mjs" \
               --include="*.json" --include="*.yml" --include="*.yaml" \
               --include="*.env*" --include="*.config" --include="*.properties" \
               --exclude="*.example*" --exclude="*.sample*" \
               --exclude="package-lock.json" \
               --exclude-dir=node_modules --exclude-dir=bin --exclude-dir=obj \
               --exclude-dir=.git --exclude-dir=dist --exclude-dir=build \
               --exclude-dir=examples --exclude-dir=notes \
               --exclude-dir='SqlSugar-vs-EFCore效能測試-MySQL版' \
               --exclude-dir='SqlSugar-vs-EFCore效能測試-SqlServer版' . ; then
            echo "::error::偵測到疑似機密資訊硬編碼"
            echo "::error::請改用環境變數、.env(已 .gitignore)或 secret manager"
            echo "::error::若為誤判,請用 *.example 後綴或在該行加 // pragma: allowlist secret"
            exit 1
          fi
          echo "未發現明顯機密資訊"

  build-test:
    name: Build & Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: fc-designer-mcp
            dir: fc-designer-mcp
          - name: sqlsugar-mcp
            dir: sqlsugar-mcp/sqlsugar-mcp-server
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check & Build
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Verify build output
        run: |
          if [ ! -f dist/index.js ]; then
            echo "::error::Build did not produce dist/index.js"
            exit 1
          fi
          echo "Build artifacts:"
          ls -la dist/

  docker-build:
    name: Docker Build Verify (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: fc-designer-mcp
            context: ./fc-designer-mcp
          - image: sqlsugar-mcp
            context: ./sqlsugar-mcp/sqlsugar-mcp-server
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (no push)
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: false
          load: true
          tags: ${{ matrix.image }}:ci-test
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
