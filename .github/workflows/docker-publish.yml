name: Docker Publish

# =============================================================================
# monorepo 版 — matrix 同時建構並推送所有 server 的 Docker 映像至 GHCR
# 觸發時機:
#   1. push tag v*.*.*           → 推 :vX.Y.Z + :X.Y + :X + :latest
#   2. push to main(已通過 CI)  → 推 :main + :sha-<short>
#   3. 手動觸發(workflow_dispatch) → 輸入自訂 tag
#
# 映像位置:ghcr.io/<owner>/<image>
#   - fc-designer-mcp → ghcr.io/elf-express/fc-designer-mcp
#   - sqlsugar-mcp    → ghcr.io/elf-express/sqlsugar-mcp(維持原名,線上不斷)
# =============================================================================

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: '自訂映像 tag (例如 dev-test)'
        required: true
        type: string
        default: 'manual'

env:
  REGISTRY: ghcr.io

# GHCR 需要 packages:write 才能推送映像
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: docs-mcp-server
            context: ./docs-mcp-server
            title: Docs MCP Server (multi-corpus)
            description: Multi-corpus MCP server for searching bundled markdown docs
          - image: docs-registrar
            context: ./mcpjungle
            dockerfile: ./mcpjungle/Dockerfile.registrar
            title: MCPJungle registrar (docs configs baked in)
            description: One-shot registrar with bundled server registration configs
          - image: fc-designer-mcp
            context: ./fc-designer-mcp
            title: FcDesigner Pro Docs MCP Server
            description: MCP server for querying FcDesigner Pro documentation
          - image: sqlsugar-mcp
            context: ./sqlsugar-mcp/sqlsugar-mcp-server
            title: SqlSugar MCP Server
            description: MCP server for querying SqlSugar ORM documentation
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      # 多平台建構支援(Linux/amd64 + arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      # 登入 GHCR:有 GHCR_PAT(org 允許的合規 PAT、含 write:packages)就用它,否則 fallback GITHUB_TOKEN。
      # 用 with.password 的 `||` fallback,不是 step `if:`——secrets context 在 step if 條件中不可用
      # (會報 "Unrecognized named-value: 'secrets'"),放進 with.password 才合法。
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      # 自動產生映像 tags 與 labels
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.vendor=elf-express
            org.opencontainers.image.licenses=MIT

      # 實際建構 + 推送
      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile || format('{0}/Dockerfile', matrix.context) }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: false  # 避免 GHCR 顯示 "unknown/unknown" 平台

      - name: Summary
        run: |
          echo "## 🐳 ${{ matrix.image }} 映像已發布" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
