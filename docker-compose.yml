# mcp-library —— 一鍵起全部:Postgres(shared-db)+ MCPJungle gateway + docs-mcp + registrar。
# 透過 include 疊加 shared-db 與 mcpjungle 兩個 stack(各自也可單獨部署,見其資料夾)。
#
# 前置(一次):建立兩個 Docker 網路
#   docker network create shared-db mcpjungl
# 起:
#   cp .env.example .env        # 填 POSTGRES_PASSWORD 與 MCPJUNGLE_DATABASE_URL
#   docker compose up -d --build
#
# Dockhand:指向本 repo、compose 路徑 docker-compose.yml,env 編輯器填上述兩個機密 → 一鍵全起。
#
# 註:舊的 standalone sqlsugar / fc 已被 docs-mcp 的「語料」取代,不在此一鍵堆疊;
#     若仍要單獨跑,進各自資料夾(sqlsugar-mcp/… 或 fc-designer-mcp/)docker compose up。
include:
  - shared-db/docker-compose.yml             # Postgres(shared-db 網路)
  - mcpjungle/docker-compose.mcpjungle.yml   # gateway + docs-mcp + registrar(mcpjungl + shared-db)
