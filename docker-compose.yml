# mcp-library —— 一鍵起 gateway + docs-mcp + registrar(build 法)。
# DB 用外部 IP(見 .env 的 MCPJUNGLE_DATABASE_URL);網路 mcpjungl 由 stack 自建,不必先 docker network create。
# 起:
#   cp .env.example .env        # 填 MCPJUNGLE_DATABASE_URL(host 用你 DB 的 IP)
#   docker compose up -d --build
#
# Dockhand:指向本 repo、compose 路徑 docker-compose.yml,env 編輯器填 MCPJUNGLE_DATABASE_URL → 一鍵全起。
# pull 法(不在 server build)見 docker-compose.pull.yml。
include:
  - mcpjungle/docker-compose.mcpjungle.yml
