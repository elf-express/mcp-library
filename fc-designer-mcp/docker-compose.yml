services:
  fc-docs-mcp:
    build: .
    image: ghcr.io/elf-express/fc-docs-mcp:latest
    container_name: fc-docs-mcp
    ports:
      - "5689:5689"
    environment:
      TRANSPORT: http
      PORT: "5689"
      # 設 token 即要求 Authorization: Bearer <token>;留空則公開存取
      MCP_AUTH_TOKEN: ${FC_MCP_AUTH_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5689/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
